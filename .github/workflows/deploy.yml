name: Deploy to Tencent server

on:
  push:
    branches: [main]

# 同一时间只跑一个部署，避免并发覆盖
concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 1) 在 runner 上打源码包，明确排除生产库/密钥/依赖
      - name: Pack source (exclude DB/.env/node_modules)
        run: |
          tar --exclude='signin.db' --exclude='signin.db-wal' --exclude='signin.db-shm' \
              --exclude='.env' --exclude='node_modules' --exclude='.git' --exclude='backups' \
              --exclude='deploy_remote.py' \
              -czf deploy.tar.gz \
              server.js public tests package.json package-lock.json \
              .env.example backup-db.js deploy-tencent.sh TENCENT_DEPLOY.md README.md "API文档.md"
          ls -lh deploy.tar.gz

      # 2) 通过 HTTP 部署回调推送到服务器 3000 端口（无需 SSH/防火墙放行 22）
      - name: Deploy via HTTP callback
        run: |
          echo "=== 推送源码包到部署接口 ==="
          HTTP_CODE=$(curl -sS -m 60 \
            -H "x-deploy-secret: ${{ secrets.DEPLOY_SECRET }}" \
            -H "Content-Type: application/octet-stream" \
            --data-binary "@deploy.tar.gz" \
            -o /tmp/deploy_response.json \
            -w "%{http_code}" \
            http://114.132.121.192:3000/api/deploy)
          echo "HTTP $HTTP_CODE"
          echo "=== 服务器响应 ==="
          cat /tmp/deploy_response.json
          if [ "$HTTP_CODE" != "200" ]; then exit 1; fi
